<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1d; height: 100%; }
  #info {
    position: absolute; top: 16px; left: 16px; color: #ddd;
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; opacity: 0.7;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  #controls {
    position: absolute; top: 56px; left: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    transition: opacity 1.2s ease;
  }
  #info.ui-hidden, #controls.ui-hidden {
    opacity: 0;
    pointer-events: none;
  }
  #controls button {
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: #eee;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
    cursor: pointer; backdrop-filter: blur(4px);
    transition: background 0.15s ease;
    width: 52px; height: 52px; text-align: center; padding: 0;
  }
  #controls button:hover { background: rgba(255,255,255,0.18); }
  #controls button:disabled { opacity: 0.35; cursor: default; }
  #controls button.active { background: rgba(255,255,255,0.3); border-color: #fff; }
  #actionButtons {
    display: flex; flex-direction: row; gap: 8px;
  }
  #shapeToggle {
    display: flex; flex-direction: row; gap: 8px;
  }
  .shapeBtn {
    width: 60px; height: 60px; padding: 4px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; cursor: pointer; backdrop-filter: blur(4px);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .shapeBtn img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }
  .shapeBtn:hover { background: rgba(255,255,255,0.15); }
  .shapeBtn.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.7); }
  #speedControl {
    display: flex; flex-direction: column; gap: 4px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 6px; padding: 8px 10px; backdrop-filter: blur(4px);
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; color: #eee;
    width: 240px; box-sizing: border-box;
  }
  #speedControl input[type="range"] {
    width: 100%;
  }
  #vignette {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
    background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0) 65%, rgba(0,0,0,0.55) 100%);
    opacity: 0.6; transition: opacity 0.35s ease;
  }
  #vignette.active {
    opacity: 1;
  }  #clock {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
    font-size: 39px; font-weight: 700;
    color: rgba(255,255,255,0.33);
    letter-spacing: 2px;
    pointer-events: none; z-index: 6;
    user-select: none;
  }
</style>
</head>

// --- Shape toggle (sphere / cube) ---
function makeCubeLines(color) {
  const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(3.2, 3.2, 3.2));
  const mat = new THREE.LineBasicMaterial({ color: color || 0x6699ff });
  return new THREE.LineSegments(edges, mat);
}

let currentShape = 'sphere'; // 'sphere' | 'cube'

function setWireframeMode(mat, isWireframe) {
  mat.wireframe = isWireframe;
}

function attachCubeLines(obj, color) {
  if (!obj.userData.cubeLines) {
    obj.userData.cubeLines = makeCubeLines(color || obj.material.color);
    obj.add(obj.userData.cubeLines);
    obj.material.userData.linkedCubeLines = obj.userData.cubeLines;
  }
  obj.userData.cubeLines.visible = true;
  obj.userData.cubeLines.material.color.copy(obj.material.color);
}

function detachCubeLines(obj) {
  if (obj.userData.cubeLines) obj.userData.cubeLines.visible = false;
}

function swapGeometry(shape) {
  const isCube = shape === 'cube';
  currentShape = shape;

  // Main mesh: keep the object visible (cube lines are its child);
  // hide only the sphere surface via material.visible
  mesh.geometry = geometry;
  mesh.material.wireframe = false;
  mesh.material.visible = !isCube;
  if (isCube) attachCubeLines(mesh); else detachCubeLines(mesh);

  // Satellites
  for (const entry of extraSpheres) {
    entry.mesh.geometry.dispose();
    entry.mesh.geometry = geometry.clone();
    entry.mesh.material.wireframe = false;
    entry.mesh.material.visible = !isCube;
    if (isCube) attachCubeLines(entry.mesh); else detachCubeLines(entry.mesh);
  }

  document.getElementById('shapeSpherebtn').classList.toggle('active', !isCube);
  document.getElementById('shapeCubeBtn').classList.toggle('active', isCube);
}

document.getElementById('shapeSpherebtn').addEventListener('click', () => swapGeometry('sphere'));
document.getElementById('shapeCubeBtn').addEventListener('click', () => swapGeometry('cube'));

// --- Reusable elliptical orbit helper ---
// Builds a tilted elliptical path around a center point (default: origin).
// radiusA/radiusB control the two ellipse axes (equal = circle).
function makeOrbit(radiusA, radiusB, speed, phase, tiltAxis, tiltAngle) {
  const quat = new THREE.Quaternion().setFromAxisAngle(tiltAxis.clone().normalize(), tiltAngle);
  return {
    phase,
    speed,
    positionAt(angle) {
      const local = new THREE.Vector3(
        radiusA * Math.cos(angle),
        radiusB * Math.sin(angle),
        0
      );
      local.applyQuaternion(quat);
      return local;
    }
  };
}

// --- Color / grayscale mode ---
let colorMode = true; // true = color, false = grayscale
const GRAY_MIN = 0.03; // almost black
const GRAY_MAX = 0.66; // 66% white

function applyColorModeToMaterial(mat) {
  const orig = mat.userData.origColor;
  if (!orig) return;
  const DIM = 0.6; // 40% dimmer than full strength
  if (colorMode) {
    mat.color.copy(orig).multiplyScalar(DIM);
    if (mat.emissive && mat.userData.origEmissive) mat.emissive.copy(mat.userData.origEmissive).multiplyScalar(DIM);
  } else {
    const l = (mat.userData.grayLevel ?? GRAY_MAX) * DIM;
    mat.color.setRGB(l, l, l);
    if (mat.emissive) mat.emissive.setRGB(l, l, l);
  }
  if (mat.userData.linkedCubeLines) {
    mat.userData.linkedCubeLines.material.color.copy(mat.color);
  }
}

function refreshAllColorModes() {
  applyColorModeToMaterial(material);
  for (const entry of extraSpheres) applyColorModeToMaterial(entry.mesh.material);

  colorMode = !colorMode;

function randomRange(min, max) {
  return min + Math.random() * (max - min);

function addRandomSphere() {
  // Clone the original wireframe geometry (same shape/edges as the main mesh)
  const sphereGeo = geometry.clone();
  const hue = Math.random();

    color: color.clone(),
    metalness: 0.1,
    roughness: 0.5,
    emissive: color.clone(),
    emissiveIntensity: 0.7,
  });
  sphereMat.userData.origColor = color.clone();
  sphereMat.userData.origEmissive = color.clone();
  sphereMat.userData.grayLevel = randomRange(GRAY_MIN, GRAY_MAX);
  applyColorModeToMaterial(sphereMat);

  const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);

  if (currentShape === 'cube') {
    sphereMat.visible = false;
    attachCubeLines(sphereMesh);

  // Same size ballpark as the original sphere: 70%-130%
  const baseScale = randomRange(0.4, 1.8);
  sphereMesh.scale.set(baseScale, baseScale, baseScale);

  // randomly tilted plane, centered on the main sphere's current position

  const orbitRadiusA = randomRange(2.5, 6);
  const orbitRadiusB = orbitRadiusA * randomRange(0.55, 1.0); // elongate the ellipse

  const tiltAxis = new THREE.Vector3(
    randomRange(-1, 1), randomRange(-1, 1), randomRange(-1, 1)
  );
  const tiltAngle = randomRange(0, Math.PI);

  const orbit = makeOrbit(orbitRadiusA, orbitRadiusB, orbitSpeed, orbitStartPhase, tiltAxis, tiltAngle);
  sphereMesh.position.copy(mesh.position).add(orbit.positionAt(orbit.phase));

  scene.add(sphereMesh);

}

  entry.mesh.geometry.dispose();
  entry.mesh.material.dispose();
  updateButtonStates();
}

function updateButtonStates() {
  const removeBtn = document.getElementById('removeSphereBtn');
  if (removeBtn) removeBtn.disabled = extraSpheres.length === 0;
}

function resetScene() {
  while (extraSpheres.length > 0) {
    removeLastSphere();
  }
}

document.getElementById('addSphereBtn').addEventListener('click', addRandomSphere);
document.getElementById('removeSphereBtn').addEventListener('click', removeLastSphere);
document.getElementById('resetBtn').addEventListener('click', resetScene);
document.getElementById('colorToggleBtn').addEventListener('click', toggleColorMode);
updateButtonStates();

// Keyboard shortcuts: + add, - remove, x reset, c toggle color
window.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') { addRandomSphere(); }
  else if (e.key === '-' || e.key === '_') { removeLastSphere(); }
  else if (e.key === 'x' || e.key === 'X') { resetScene(); }
  else if (e.key === 'c' || e.key === 'C') { toggleColorMode(); }
});

const controlsPanel = document.getElementById('controls');
const vignette = document.getElementById('vignette');
controlsPanel.addEventListener('mouseenter', () => vignette.classList.add('active'));
controlsPanel.addEventListener('mouseleave', () => vignette.classList.remove('active'));

// --- UI auto-fade after 10 seconds of mouse inactivity ---
const uiEls = [document.getElementById('info'), controlsPanel];
let uiHideTimer = null;

function showUI() {
  uiEls.forEach(el => el.classList.remove('ui-hidden'));
  // restore controls pointer events when visible
  controlsPanel.style.pointerEvents = '';
}

function scheduleHide() {
  clearTimeout(uiHideTimer);
  uiHideTimer = setTimeout(() => {
    uiEls.forEach(el => el.classList.add('ui-hidden'));
    controlsPanel.style.pointerEvents = 'none';
  }, 10000);
}

window.addEventListener('mousemove', () => { showUI(); scheduleHide(); });
window.addEventListener('mousedown', () => { showUI(); scheduleHide(); });
window.addEventListener('wheel',     () => { showUI(); scheduleHide(); });
scheduleHide(); // start the timer on load

// --- Clock (24h, H:M) ---
const clockEl = document.getElementById('clock');
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  clockEl.textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 1000);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.32);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.32);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

const baseLightIntensities = {
  ambient: ambientLight.intensity,
  dir1: dirLight.intensity,
  dir2: dirLight2.intensity,
};

// Simple orbit controls (no extra script dependency)
let isDragging = false, prevX = 0, prevY = 0;
let camTheta = 0, camPhi = Math.PI / 2.4, camRadius = 7;

// Pan target: orbit camera now looks at and rotates around this point
// instead of a fixed world origin, so middle-mouse-button panning can move it.
const camTarget = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  camera.position.x = camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = camTarget.y + camRadius * Math.cos(camPhi);
  camera.position.z = camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(camTarget);
}
updateCamera();

// Prevent the browser's default middle-click autoscroll behavior
renderer.domElement.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

let dragButton = 0; // 0 = left (orbit), 1 = middle (pan)
renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 1) e.preventDefault(); // stop autoscroll cursor on MMB
  isDragging = true;
  dragButton = e.button;
  prevX = e.clientX;
  prevY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  prevX = e.clientX; prevY = e.clientY;

  if (dragButton === 1) {
    // Middle-mouse-button drag: pan the view target in screen space
    const panSpeed = camRadius * 0.0015;
    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    right.setFromMatrixColumn(camera.matrixWorld, 0); // camera right vector
    up.setFromMatrixColumn(camera.matrixWorld, 1);    // camera up vector
    camTarget.addScaledVector(right, -dx * panSpeed);
    camTarget.addScaledVector(up, dy * panSpeed);
    updateCamera();
  } else {
    camTheta -= dx * 0.005;
    camPhi = Math.min(Math.max(0.1, camPhi - dy * 0.005), Math.PI - 0.1);
    updateCamera();
  }
});
renderer.domElement.addEventListener('wheel', (e) => {
  camRadius = Math.min(Math.max(3, camRadius + e.deltaY * 0.01), 20);
  updateCamera();
});
renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let lastTime = performance.now();
let elapsed = 0;
const PULSE_PERIOD = 15.0; // seconds for a full cycle (7.5s up, 7.5s down)
const SCALE_MIN = 1.0;
const SCALE_MAX = 1.5;

// --- Speed control ---
let speedMultiplier = 1.0;
const speedSlider = document.getElementById('speedSlider');
const speedValueLabel = document.getElementById('speedValue');
speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
  speedValueLabel.textContent = speedMultiplier.toFixed(2) + 'x';
});

// --- Dimmer control (scales overall scene lighting) ---
const dimmerSlider = document.getElementById('dimmerSlider');
const dimmerValueLabel = document.getElementById('dimmerValue');
function applyDimmer(value) {
  ambientLight.intensity = baseLightIntensities.ambient * value;
  dirLight.intensity = baseLightIntensities.dir1 * value;
  dirLight2.intensity = baseLightIntensities.dir2 * value;
  dimmerValueLabel.textContent = Math.round(value * 100) + '%';
}
dimmerSlider.addEventListener('input', () => {
  applyDimmer(parseFloat(dimmerSlider.value));
});
applyDimmer(parseFloat(dimmerSlider.value));

// --- Ellipse (orbit) speed control ---
let ellipseSpeedMultiplier = 1.0;
const ellipseSpeedSlider = document.getElementById('ellipseSpeedSlider');
const ellipseSpeedValueLabel = document.getElementById('ellipseSpeedValue');
ellipseSpeedSlider.addEventListener('input', () => {
  ellipseSpeedMultiplier = parseFloat(ellipseSpeedSlider.value);
  ellipseSpeedValueLabel.textContent = ellipseSpeedMultiplier.toFixed(2) + 'x';
});

// --- Blur control (whole-image CSS blur on the canvas, 0% crisp -> 100% fog) ---
const blurSlider = document.getElementById('blurSlider');
const blurValueLabel = document.getElementById('blurValue');
const MAX_BLUR_PX = 35; // at 100%, lines fully dissolve into fog
function applyBlur(percent) {
  const px = (percent / 100) * MAX_BLUR_PX;
  renderer.domElement.style.filter = px > 0 ? `blur(${px}px)` : 'none';
  blurValueLabel.textContent = Math.round(percent) + '%';
}
blurSlider.addEventListener('input', () => {
  applyBlur(parseFloat(blurSlider.value));
});
applyBlur(parseFloat(blurSlider.value));

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  elapsed += dt;

  mesh.rotation.x += SPEEDS[0] * speedMultiplier * dt;
  mesh.rotation.y += SPEEDS[1] * speedMultiplier * dt;
  mesh.rotation.z += SPEEDS[2] * speedMultiplier * dt;

  // Advance the main sphere along its own slow elliptical orbit
  mainOrbit.phase += mainOrbit.speed * ellipseSpeedMultiplier * dt;
  mesh.position.copy(mainOrbit.positionAt(mainOrbit.phase));

  // Smooth pulse factor between SCALE_MIN and SCALE_MAX (main sphere, phase 0)
  const mid = (SCALE_MIN + SCALE_MAX) / 2;
  const amp = (SCALE_MAX - SCALE_MIN) / 2;
  const pulse = mid - amp * Math.cos((2 * Math.PI / PULSE_PERIOD) * elapsed);
  mesh.scale.set(pulse, pulse, pulse);

  for (const entry of extraSpheres) {
    entry.mesh.rotation.x += entry.speeds[0] * speedMultiplier * dt;
    entry.mesh.rotation.y += entry.speeds[1] * speedMultiplier * dt;
    entry.mesh.rotation.z += entry.speeds[2] * speedMultiplier * dt;
    const phasedTime = elapsed + (entry.phaseOffset || 0);
    const entryPulse = mid - amp * Math.cos((2 * Math.PI / PULSE_PERIOD) * phasedTime);
    const s = entry.baseScale * entryPulse;
    entry.mesh.scale.set(s, s, s);

    // Advance along the orbit path, centered on the main sphere's current position
    entry.orbit.phase += entry.orbit.speed * ellipseSpeedMultiplier * dt;
    entry.mesh.position.copy(mesh.position).add(entry.orbit.positionAt(entry.orbit.phase));
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
